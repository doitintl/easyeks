apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: observability-aggregator-vector
  namespace: observability
spec:
  secretName: "https-cert-for-observability-aggregator-vector" #(this Certificate object generates this kube secret)
  isCA: false
  usages:
  - key encipherment
  - server auth
  - signing
  duration: "306600h" #<-- 24h * 365d/yr * 35 yr
  renewBeforePercentage: 95
  subject:
    organizations:
    - cert-manager
  dnsNames: #v-- inner cluster dns names + localhost for debugging from kubectl exec & kubectl port-forward
  - localhost
  - observability-aggregator-vector
  - observability-aggregator-vector.observability
  - observability-aggregator-vector.observability.svc
  - observability-aggregator-vector.observability.svc.cluster
  - observability-aggregator-vector.observability.svc.cluster.local
  - observability-aggregator-vector-headless
  - observability-aggregator-vector-headless.observability
  - observability-aggregator-vector-headless.observability.svc
  - observability-aggregator-vector-headless.observability.svc.cluster
  - observability-aggregator-vector-headless.observability.svc.cluster.local
  privateKey:
    rotationPolicy: Never #Never: disables auto rotation, meaning less can go wrong.
    algorithm: ECDSA      #^--Reasonable as this is only used on inner-cluster network
    size: 384
  issuerRef:
    name: frugal-observability-certificate-issuer
    kind: Issuer
    group: cert-manager.io
