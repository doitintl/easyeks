# Debug Tips:
# * kubectl logs --previous deploy/grafana --container grafana-sc-dashboard -n=observability
#   ^-- this one's rarely useful for debugging
# * cdk deploy dev1-eks-essentials --require-approval=never && kubectl rollout restart deploy/grafana -n=observability && kubectl rollout status deploy/grafana -n=observability
#   ^-- potentially useful for iterative testing, to allow clean log messages
# * kubectl logs  deploy/grafana --container grafana -n=observability | grep "error msg"
#   Example Output:
#   logger=provisioning.dashboard type=file name=sidecarProvider t=2025-12-02T16:57:05.597586992Z level=error msg="failed to load dashboard from " file=/tmp/dashboards/kubernetes-container-logs-dashboard.json error="Dashboard title cannot be empty"
