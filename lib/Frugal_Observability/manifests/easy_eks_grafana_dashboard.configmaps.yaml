# Debug Tips:
# * kubectl logs --previous deploy/grafana --container grafana-sc-dashboard -n=observability
#   ^-- this one's rarely useful for debugging
# * cdk deploy dev1-eks-essentials --require-approval=never && kubectl rollout restart deploy/grafana -n=observability && kubectl rollout status deploy/grafana -n=observability
#   ^-- potentially useful for iterative testing, to allow clean log messages
# * kubectl logs  deploy/grafana --container grafana -n=observability | grep "error msg"
#   Example Output / Example Errors:
#   * logger=provisioning.dashboard type=file name=sidecarProvider t=2025-12-02T16:57:05.597586992Z level=error msg="failed to load dashboard from " file=/tmp/dashboards/kubernetes-container-logs-dashboard.json error="Dashboard title cannot be empty"
#     ^-- probably exported dashboard as V1 Resource or V2 Resource, export using the classic model
#   * logger=provisioning.dashboard type=file name=sidecarProvider t=2025-12-02T23:12:08.167778543Z level=error msg="failed to load dashboard from " file=/tmp/dashboards/kubernetes-container-logs-dashboard.json error="invalid character '}' looking for beginning of object key string"
#     ^-- bad syntax from manual edit, try jsonlint.com, I had an extra comma, which can be valid json in typescript, but grafana uses a strict json parser.
#####################################
# TIPs for How to Manage Dashboards
# * Best Tip:
#   * Try to use the defaults, avoid tinkering without a good reason as this takes time to learn, debug, and get right.
# * To edit temporarily for testing purposes:
#   * You'd want to set the node selector to on-demand, due to lack of persistence when grafana is backed by deployment.
#   * You'd need to export "provisioned" (read only) dashboard, and import them as a new name & UID
# * To edit permanently:
#   * You'd need to create or update a configmap with a GUI export of dashboard.
#   * When exporting dashboard from GUI:
#     * ConfigMap managed dashboards only support export Model = Classic, (which only offers type of JSON export)
#     * A V1 Resource / V2 Resource model export won't import correclty by the configmap method
#       (Unless you manally extract the contents of spec, usually around line 21 of export.)
#####################################
---
