apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubernetes-events-aggregator
  annotations:
    purpose: "allows-aggregation-of-kubernetes-event-logs"
rules:
- apiGroups: 
  - "*"
  resources: 
  - events
  verbs: 
  - get
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aggregator-kube-events
roleRef:
  kind: ClusterRole
  name: kubernetes-events-aggregator
subjects:
- kind: ServiceAccount
  name: observability-aggregator-vector
  namespace: observability
---
apiVersion: v1
kind: Secret
metadata:
  name: observability-aggregator-vector-kube-sa-token
  annotations:
    kubernetes.io/service-account.name: observability-aggregator-vector
type: kubernetes.io/service-account-token